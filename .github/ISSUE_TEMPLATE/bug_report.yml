name: 🐛 Bug 报告
description: 报告 Bug，必须附带日志和复现步骤
title: "[BUG] "
labels: [bug]
assignees: []
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 用一句话说清楚这是什么 Bug
      placeholder: "例：sandbox 路径映射少一层目录，导致 Windows 路径映射失败"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: |
        在终端中运行以下命令，将**完整输出**粘贴到下方（替代手填）：

        ```
        # PowerShell
        irm https://raw.githubusercontent.com/14790897/MiQi/main/scripts/diagnose.ps1 | iex

        # WSL / Git Bash / macOS / Linux
        curl -sSL https://raw.githubusercontent.com/14790897/MiQi/main/scripts/diagnose.sh | bash
        ```
      placeholder: |
        --- MIQI DIAGNOSTIC ---
        ## OS
        ...
        --- END DIAGNOSTIC ---
      value: |
        （运行上方命令后将输出粘贴到这里）
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 从零开始的精确操作步骤，让维护者可以照做复现
      placeholder: |
        1. 启动 MiQi，打开默认会话
        2. 输入消息 "ls /mnt/c/Users/xxx"
        3. 观察沙箱内路径
        4. 路径少了一层目录
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: frequency
    attributes:
      label: 复现频率
      description: 必现 / 偶现 / 特定条件下必现
      placeholder: "必现"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 正确情况应该怎样
      placeholder: "路径应映射为 /home/miqi/workspace/sessions/xxx/files/..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
      placeholder: "路径映射为 /home/miqi/workspace/files/...，缺少 session_key 目录"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 粘贴完整的报错日志、堆栈信息、终端输出。**必须提供，不接受空白**
      placeholder: |
        Traceback (most recent call last):
          File "miqi/sandbox/bwrap.py", line 342, in _resolve_sandbox_path
            ...
        Error: path mapping missing session_key directory
      render: shell
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: 截图/录屏（可选）
      description: 如果日志不足以说明问题，请附上截图或录屏链接
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 已排查过什么、相关 commit/PR、参考资料
    validations:
      required: false
