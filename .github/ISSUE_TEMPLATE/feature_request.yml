name: ✨ Feature 请求
description: 提出新功能或改进建议
title: "[FEATURE] "
labels: [enhancement]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: 功能概述
      description: 一句话说明要做什么
      placeholder: "例：支持 Agent 执行结果导出为 Markdown 文件"
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 需求背景
      description: 为什么需要这个功能？解决什么痛点？
      placeholder: "用户在 Agent 对话结束后需要保存结果，目前只能截图，希望导出为文本文件"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 功能描述
      description: 详细描述功能行为、交互方式
      placeholder: |
        1. 会话页面增加「导出」按钮
        2. 点击后弹出格式选择：Markdown / 纯文本
        3. 导出内容包含完整对话历史
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 有没有其他实现思路或替代方案
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 从项目角度评估
      options:
        - P0 紧急
        - P1 重要
        - P2 一般
        - P3 锦上添花
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 参考资料
      description: 竞品截图、设计稿链接、相关 Issue/PR
    validations:
      required: false
