name: PR 模板校验

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 PR 模板是否完整填写
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            // 去掉 HTML 注释（<!-- xxx -->）
            const withoutComments = body.replace(/<!--[\s\S]*?-->/g, '').trim();

            // 检查 PR 描述中是否包含图片（Markdown 图片语法 或 GitHub 上传的图片附件）
            const hasImage = /!\[.*?\]\(.*?\)/.test(withoutComments) ||
                             /https?:\/\/github\.com\/user-attachments\/assets\/[^\s)]+/.test(body);

            // 判断是否勾选了 Feature（新功能）
            const isFeature = /\[x\].*✨.*新功能/.test(withoutComments);

            // 判断 PR 是否涉及界面/UI 修改（标题或正文中出现关键词）
            const title = context.payload.pull_request.title || '';
            const uiKeywords = /界面|UI|样式|CSS|布局|前端|页面|组件|弹窗|对话框|按钮|图标|菜单|导航|侧边栏|主题|配色|字体|动画|渲染|窗口|桌面|viewport|frontend|styling|component|dialog|modal|button|icon|sidebar|navbar|theme|layout|animation/;
            const isUIChange = uiKeywords.test(title) || uiKeywords.test(withoutComments);
            const needsScreenshot = isFeature || isUIChange;

            const checks = [
              {
                label: '类型',
                // 至少勾选了一项
                check: () => /\[x\]/.test(withoutComments),
              },
              {
                label: '变更概述',
                check: () => {
                  const m = withoutComments.match(/## 变更概述\s*\n+(.+?)(?=\n##|\n*$)/s);
                  return m && m[1].trim().length > 0;
                },
              },
              {
                label: '背景/问题',
                check: () => {
                  const m = withoutComments.match(/## 背景\/问题\s*\n+(.+?)(?=\n##|\n*$)/s);
                  return m && m[1].trim().length > 0;
                },
              },
              {
                label: '变更内容',
                check: () => {
                  const m = withoutComments.match(/## 变更内容\s*\n+(.+?)(?=\n##|\n*$)/s);
                  return m && m[1].trim().length > 0;
                },
              },
              {
                label: '日志/验证证据',
                check: () => {
                  const m = withoutComments.match(/## 日志\/验证证据\s*\n+```\s*\n([\s\S]*?)```/);
                  if (!m) return false;
                  const content = m[1].trim();
                  const hasLog = content.length > 0 && content !== '（粘贴日志/截图）';
                  return hasLog || hasImage;
                },
              },
              {
                label: '测试情况',
                check: () => {
                  const m = withoutComments.match(/## 测试情况\s*\n+(.+?)(?=\n##|\n*$)/s);
                  return m && m[1].trim().length > 0;
                },
              },
              {
                label: '截图',
                // Feature 或界面相关 PR 必须包含截图
                check: () => {
                  if (needsScreenshot) {
                    return hasImage;
                  }
                  return true; // 非界面/非 Feature PR 不强制截图
                },
              }
            ];

            const failures = checks.filter(c => !c.check()).map(c => c.label);

            if (failures.length > 0) {
              const isScreenshotFail = failures.includes('截图');
              const extraMsg = isScreenshotFail
                ? '\n\n⚠️ Feature 或界面相关 PR 必须附带截图（Markdown 图片或拖拽上传均可）。'
                : '';
              core.setFailed(
                `PR 模板以下必填节为空，请补充：\n${failures.map(f => `  - ${f}`).join('\n')}` +
                `\n\n不允许空白节，必须有日志/证据。${extraMsg}`
              );
            } else {
              console.log('✅ PR 模板填写完整');
            }
